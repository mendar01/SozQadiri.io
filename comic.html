    <style>
        /* Комикс суреттерінің торы (Сетка комикса) */
        .comic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .comic-item {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            object-fit: cover;
            aspect-ratio: 1 / 1.4; /* Стандартная пропорция комикса */
            border: 2px solid transparent;
        }

        .comic-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            border-color: #2563eb; /* Синяя рамка при наведении */
        }

        /* Лайтбокс (Всплывающее окно) */
        .lightbox {
            display: none; /* Бастапқыда жасырын */
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.95); /* Темный фон с небольшим блюром */
            backdrop-filter: blur(5px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.show {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            user-select: none;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .lb-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #f8fafc;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .lb-close:hover {
            color: #ef4444; /* Красный при наведении */
        }

        /* Басқару батырмалары (Панель управления) */
        .lightbox-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .lb-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
        }

        .lb-btn:hover {
            background-color: #1d4ed8;
        }

        .lb-btn:active {
            transform: scale(0.95);
        }

        #lb-counter {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            min-width: 90px;
            text-align: center;
        }
    </style>
</head>

    <script src="assets/js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const comicItems = document.querySelectorAll('.comic-item');
            const lightbox = document.getElementById('lightbox');
            const lbImg = document.getElementById('lb-img');
            const lbClose = document.getElementById('lb-close');
            const lbPrev = document.getElementById('lb-prev');
            const lbNext = document.getElementById('lb-next');
            const lbCounter = document.getElementById('lb-counter');
            
            let currentIndex = 0;
            const totalItems = comicItems.length;

            // Функция обновления лайтбокса
            function updateLightbox(index) {
                if (index < 0) index = totalItems - 1; // Возврат в конец
                if (index >= totalItems) index = 0;    // Возврат в начало
                
                currentIndex = index;
                lbImg.src = comicItems[currentIndex].src;
                lbCounter.textContent = `Бет: ${currentIndex + 1}/${totalItems}`;
            }

            // Открытие при клике на картинку
            comicItems.forEach((item, index) => {
                item.addEventListener('click', () => {
                    updateLightbox(index);
                    lightbox.classList.add('show');
                    document.body.style.overflow = 'hidden'; // Убираем скролл страницы
                });
            });

            // Закрытие
            function closeLightbox() {
                lightbox.classList.remove('show');
                document.body.style.overflow = 'auto'; // Возвращаем скролл
            }

            lbClose.addEventListener('click', closeLightbox);
            
            // Закрытие при клике на пустой фон
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            // Кнопки Вперед/Назад
            lbPrev.addEventListener('click', () => updateLightbox(currentIndex - 1));
            lbNext.addEventListener('click', () => updateLightbox(currentIndex + 1));

            // Управление с клавиатуры (Стрелки и Esc)
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('show')) return;
                
                if (e.key === 'ArrowLeft') updateLightbox(currentIndex - 1);
                if (e.key === 'ArrowRight') updateLightbox(currentIndex + 1);
                if (e.key === 'Escape') closeLightbox();
            });
        });
    </script>
